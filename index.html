<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rive Inspector</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1b26;color:#c0caf5;height:100vh;overflow:hidden}
.hidden{display:none!important}
#dropzone{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;border:3px dashed #3b4261;margin:20px;border-radius:16px;transition:border-color .2s}
#dropzone.over{border-color:#7aa2f7;background:rgba(122,162,247,.05)}
.drop-icon{font-size:64px;margin-bottom:16px}
#dropzone h1{color:#7aa2f7;font-size:24px;margin-bottom:8px}
#dropzone p{color:#565f89;font-size:14px}
.link{color:#7aa2f7;cursor:pointer;text-decoration:underline}
#main{display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;padding:8px 16px;background:#24283b;border-bottom:1px solid #3b4261;gap:12px}
#filename{color:#7aa2f7;font-weight:600;font-size:14px;margin-right:auto}
#tabs{display:flex;gap:2px}
.tab{background:none;border:none;color:#565f89;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;font-family:inherit}
.tab:hover{color:#c0caf5;background:#3b4261}
.tab.active{color:#7aa2f7;background:#1f2335}
.btn-sm{background:#3b4261;border:none;color:#9aa5ce;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-sm:hover{background:#565f89;color:#c0caf5}
.tabcontent{flex:1;overflow:auto;display:none;padding:12px 16px}
.tabcontent.active{display:block}
/* Tree */
.tnode{margin-left:18px}
.trow{display:flex;align-items:center;padding:2px 6px;cursor:pointer;border-radius:3px;gap:6px;font-size:13px;white-space:nowrap}
.trow:hover{background:#24283b}
.tarr{color:#565f89;font-size:9px;width:12px;text-align:center;transition:transform .15s;flex-shrink:0}
.tarr.open{transform:rotate(90deg)}
.tarr.leaf{visibility:hidden}
.tidx{color:#565f89;font-size:11px;min-width:32px}
.tbadge{padding:1px 6px;border-radius:3px;font-size:11px;font-weight:600;color:#1a1b26}
.tname{color:#c0caf5;font-weight:500}
.tprops{padding:2px 0 4px 50px;display:none;font-size:12px}
.tprops.open{display:block}
.tprop{display:flex;gap:6px;padding:1px 4px}
.tprop:hover{background:#1f2335;border-radius:2px}
.tpk{color:#9aa5ce;min-width:140px}
.tpv{color:#c0caf5}.tpv.s{color:#9ece6a}.tpv.n{color:#ff9e64}.tpv.c{color:#f7768e}.tpv.b{color:#bb9af7}
.tkids{display:none}.tkids.open{display:block}
.csw{display:inline-block;width:12px;height:12px;border-radius:2px;border:1px solid #3b4261;vertical-align:middle;margin-right:3px}
/* Stats */
.stsec{margin-bottom:10px}
.stsec h3{font-size:12px;color:#7aa2f7;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #3b4261}
.strow{display:flex;padding:1px 0;font-size:12px;gap:12px}
.strow .sk{color:#9aa5ce;flex-shrink:0}.strow .sv{color:#c0caf5}
.strow.hot .sv{color:#ff6b6b;font-weight:700}
.strow.hot .sk::after{content:'🔥';margin-left:4px}
.stbar{display:flex;align-items:center;gap:6px;padding:1px 0;font-size:11px}
.stbar .bar{height:12px;border-radius:3px;min-width:2px}
.stbar .bl{color:#9aa5ce;min-width:80px}.stbar .bv{color:#565f89}
.stwarn{color:#ffa94d;font-size:12px;padding:2px 0}
/* Graph */
#tab-graph{padding:0;position:relative}
#gcanvas{display:block;cursor:grab;width:100%;height:100%}
#gcanvas.grabbing{cursor:grabbing}
.gpanel{position:absolute;right:0;top:0;bottom:0;width:320px;background:#24283b;border-left:1px solid #3b4261;overflow-y:auto;padding:12px;font-size:12px}
.gpanel h3{font-size:12px;color:#7aa2f7;margin-bottom:6px}
.gbar{position:absolute;top:8px;left:8px;display:flex;gap:4px;z-index:5}
.gbtn{background:rgba(36,40,59,.9);border:1px solid #3b4261;color:#9aa5ce;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.gbtn:hover{background:#3b4261;color:#c0caf5}
/* Export */
#tab-export .exp-btn{display:inline-block;background:#3b4261;color:#c0caf5;padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin:8px 4px;font-family:inherit}
#tab-export .exp-btn:hover{background:#7aa2f7;color:#1a1b26}
/* Search */
.search{background:#1a1b26;border:1px solid #3b4261;color:#c0caf5;padding:6px 10px;border-radius:4px;font:inherit;font-size:12px;outline:none;width:300px;margin-bottom:8px}
.search:focus{border-color:#7aa2f7}
</style>
</head><body>
<div id="app">
<div id="dropzone">
<div class="drop-icon">📦</div>
<h1>Rive Inspector</h1>
<p>拖拽 .riv 文件到此处，或 <label for="fileinput" class="link">点击选择文件</label></p>
<input type="file" id="fileinput" accept=".riv" hidden>
</div>
<div id="main" class="hidden">
<div id="topbar">
<span id="filename"></span>
<div id="tabs">
<button class="tab active" data-tab="tree">🌳 树形</button>
<button class="tab" data-tab="stats">📊 统计</button>
<button class="tab" data-tab="graph">🔗 图形</button>
<button class="tab" data-tab="export">💾 导出</button>
</div>
<button id="newfile" class="btn-sm">Open</button>
<button id="langBtn" class="btn-sm" onclick="toggleLang()">EN</button>
</div>
<div id="tab-tree" class="tabcontent active"></div>
<div id="tab-stats" class="tabcontent"></div>
<div id="tab-graph" class="tabcontent"><canvas id="gcanvas"></canvas></div>
<div id="tab-export" class="tabcontent"></div>
</div>
</div>

function readLeb128(buf, pos) {
  let r = 0, s = 0;
  while (pos < buf.length) {
    const b = buf[pos++];
    r |= (b & 0x7F) << s;
    if ((b & 0x80) === 0) return [r >>> 0, pos]; // unsigned
    s += 7;
  }
  throw new Error('LEB128 overflow');
}

function readString(buf, pos) {
  const [len, p] = readLeb128(buf, pos);
  return [new TextDecoder().decode(buf.slice(p, p + len)), p + len];
}

function readFloat32(buf, pos) {
  return [new DataView(buf.buffer, buf.byteOffset).getFloat32(pos, true), pos + 4];
}

function readUint32(buf, pos) {
  return [new DataView(buf.buffer, buf.byteOffset).getUint32(pos, true), pos + 4];
}

function readBytesVal(buf, pos) {
  const [len, p] = readLeb128(buf, pos);
  return [buf.slice(p, p + len), p + len];
}

      for (let d = stk.length-1; d >= 0; d--) {
        const allowed = STACK_CHILDREN[stk[d].obj.typeKey];
        if (allowed && allowed.has(tk)) { stk[d].children.push(nodes[i]); stk = stk.slice(0,d+1); stk.push(nodes[i]); placed=true; break; }
      }
      if (!placed) { backboard.children.push(nodes[i]); stk = [backboard, nodes[i]]; }
    }
  }

  // ViewModel tree
  const attached = new Set();
  function mark(n) { attached.add(n.obj.index); n.children.forEach(mark); }
  roots.forEach(mark);
  let vmStack = [];
  for (const n of nodes) {
    if (attached.has(n.obj.index)) continue;
    const tk = n.obj.typeKey;
    if (tk === 435) { vmStack = [n]; attached.add(n.obj.index); if(backboard){backboard.children.push(n)}else{roots.push(n)} }
    else if (VM_PROP_TYPES.has(tk) && vmStack.length) { vmStack[0].children.push(n); attached.add(n.obj.index); }
    else if (tk === 437 && vmStack.length) { vmStack[0].children.push(n); vmStack = [vmStack[0], n]; attached.add(n.obj.index); }
    else if (VM_INST_VAL_TYPES.has(tk) && vmStack.length >= 2) { vmStack[1].children.push(n); attached.add(n.obj.index); }
    else if (n.obj.parentId !== null && vmStack.length >= 2) {
      if (n.obj.properties.some(p => propName(p.key)==='viewModelPropertyId')) { vmStack[1].children.push(n); attached.add(n.obj.index); }
    }
  }
  for (const n of nodes) if (!attached.has(n.obj.index)) roots.push(n);
  return roots;
}

// Cross-reference resolver
function resolveRefs(objects, tree) {
  const abCompMaps = {};
  let curAb = null, cc = 0;
  for (const o of objects) {
    if (o.typeName === 'Artboard') { curAb = o.index; abCompMaps[curAb] = {0: o}; cc = 1; }
    else if (curAb !== null && o.parentId !== null) { abCompMaps[curAb][cc++] = o; }
    else if (curAb !== null && o.parentId === null && o.typeName !== 'Artboard') {}
  }
  const objToAb = {};
  curAb = null;
  for (const o of objects) { if (o.typeName==='Artboard') curAb=o.index; if (curAb!==null) objToAb[o.index]=curAb; }

  for (const o of objects) {
    const refs = {}, links = {};
    for (const p of o.properties) {
      const pn = propName(p.key);
      if (pn === 'objectId' && p.type === 0) {
        const ab = objToAb[o.index];
        if (ab !== undefined) {
          const t = (abCompMaps[ab]||{})[p.value];
          if (t) { let l = '#'+t.index+' '+t.typeName; if(t.name)l+=' "'+t.name+'"'; refs[p.key]=l; links[p.key]=t.index; }
        }
      }
      if (pn === 'propertyKey' && p.type === 0) refs[p.key] = propName(p.value);
      if (pn === 'animationId' && p.type === 0) {
        const ab = objToAb[o.index];
        if (ab !== undefined) {
          let ai = 0;
          for (const o2 of objects) {
            if (o2.typeName === 'LinearAnimation' && objToAb[o2.index] === ab) {
              if (ai === p.value) { refs[p.key] = '#'+o2.index+' "'+(o2.name||'anim')+'"'; links[p.key]=o2.index; break; }
              ai++;
            }
          }
        }
      }
    }
    o._refs = refs; o._refLinks = links;
  }
}

function fmtVal(p, refs) {
  if (refs && refs[p.key] !== undefined) {
    const ref = refs[p.key];
    return p.type === 0 ? ref + ' (' + p.value + ')' : ref;
  }
  if (p.type===0) return String(p.value);
  if (p.type===1) return '"'+p.value+'"';
  if (p.type===2) return String(p.value);
  if (p.type===3) return '#'+(p.value>>>0).toString(16).padStart(8,'0').toUpperCase();
  if (p.type===4) return 'bytes['+p.size+']';
  if (p.type===5) return p.value?'true':'false';
  return String(p.value);
}

// ── Stats Computation ──

function computeStats(header, objects, tree, fileSize) {
  const gp = (o, name) => { for (const p of o.properties) if (propName(p.key)===name) return p.value; return null; };
  const countType = (...names) => objects.filter(o => names.includes(o.typeName)).length;

  // Assets
  let assetBytes=0, assetCount=0;
  for (const o of objects) if (o.typeName==='FileAssetContents') for (const p of o.properties) if (propName(p.key)==='bytes'&&p.type===4) { assetBytes+=p.size||0; assetCount++; }

  const artboards = objects.filter(o=>o.typeName==='Artboard').map(o=>({name:o.name||'unnamed',width:gp(o,'width')||0,height:gp(o,'height')||0}));

  // Per-shape analysis
  const pathParam = new Set(['Ellipse','Rectangle','Triangle','Polygon','Star']);
  const pathFree = new Set(['PointsPath']);
  const vtxTypes = new Set(['StraightVertex','CubicDetachedVertex','CubicAsymmetricVertex','CubicMirroredVertex']);

  // Parent map for name resolution
  const parentMap = {};
  function buildPM(n, p) { parentMap[n.obj.index]=p; n.children.forEach(c=>buildPM(c,n)); }
  tree.forEach(r=>buildPM(r,null));
  function resolveName(node) {
    if (node.obj.name) return node.obj.name;
    let idx = node.obj.index;
    while (parentMap[idx]) { const p=parentMap[idx]; if(p.obj.name) return p.obj.name+'/'+node.obj.typeName; idx=p.obj.index; }
    return '';
  }

  const shapeCosts = [];
  let artboardFills = 0;

  function analyzeShape(node) {
    const o = node.obj;
    let clips=0, verts=0, renderPts=0, meshes=0, bones=0, images=0;
    const paths=[], paints=[];
    for (const c of node.children) {
      const tn = c.obj.typeName;
      if (tn==='Fill'||tn==='Stroke') {
        let colorType='Solid', stops=0;
        for (const gc of c.children) {
          const gtn=gc.obj.typeName;
          if (gtn==='SolidColor') colorType='Solid';
          else if (gtn==='LinearGradient') { colorType='Linear'; stops=gc.children.filter(x=>x.obj.typeName==='GradientStop').length; }
          else if (gtn==='RadialGradient') { colorType='Radial'; stops=gc.children.filter(x=>x.obj.typeName==='GradientStop').length; }
        }
        paints.push({paint:tn,color:colorType,stops});
      } else if (tn==='ClippingShape') clips++;
      else if (pathParam.has(tn)) {
        let cv=4, rp=4;
        if (tn==='Ellipse') { cv=4; rp=13; }
        else if (tn==='Triangle') { cv=3; rp=3; }
        else if (tn==='Polygon') { const n=gp(c.obj,'points')||5; cv=n; rp=n; }
        else if (tn==='Star') { const n=(gp(c.obj,'points')||5)*2; cv=n; rp=n; }
        paths.push({type:tn,mode:'param',vertices:cv,renderPts:rp}); verts+=cv; renderPts+=rp;
      } else if (pathFree.has(tn)) {
        let vc=0, rp=1;
        for (const vc2 of c.children) { const vtn=vc2.obj.typeName; if(vtxTypes.has(vtn)){vc++;rp+=vtn.includes('Cubic')?3:1;} }
        paths.push({type:tn,mode:'free',vertices:vc,renderPts:rp}); verts+=vc; renderPts+=rp;
      } else if (tn==='Mesh') meshes++;
      else if (tn==='Image') images++;
    }
    function cntBones(n) { let b=0; for(const c of n.children){if(c.obj.typeName==='Bone'||c.obj.typeName==='RootBone')b++;b+=cntBones(c);}return b; }
    bones = cntBones(node);
    return {index:o.index,name:resolveName(node),draws:paints.length,clips,paths,vertices:verts,renderPoints:renderPts,colors:paints.map(p=>p.color),meshes,bones,images,paints};
  }

  function walkShapes(node) {
    if (node.obj.typeName==='Shape') { shapeCosts.push(analyzeShape(node)); return; }
    if (node.obj.typeName==='Artboard') for (const c of node.children) if(c.obj.typeName==='Fill') artboardFills++;
    node.children.forEach(walkShapes);
  }
  tree.forEach(walkShapes);

  let standImg=0,standMesh=0,standBone=0;
  function walkStandalone(n){const tn=n.obj.typeName;if(tn==='Shape')return;if(tn==='Image')standImg++;if(tn==='Mesh')standMesh++;if(tn==='Bone'||tn==='RootBone')standBone++;n.children.forEach(walkStandalone);}
  tree.forEach(walkStandalone);

  shapeCosts.sort((a,b)=>(b.draws+b.clips*2)-(a.draws+a.clips*2));
  const totalDraws=shapeCosts.reduce((s,c)=>s+c.draws,0)+artboardFills;
  const totalClips=shapeCosts.reduce((s,c)=>s+c.clips,0);
  const totalMeshes=shapeCosts.reduce((s,c)=>s+c.meshes,0)+standMesh;
  const totalBones=shapeCosts.reduce((s,c)=>s+c.bones,0)+standBone;
  const totalImages=shapeCosts.reduce((s,c)=>s+c.images,0)+standImg;
  const drawDist={};shapeCosts.forEach(s=>{drawDist[s.draws]=(drawDist[s.draws]||0)+1;});

  // Render detail
  const paintBD={},paintVT={},paintRP={};
  let totalPathCount=0,totalPathVerts=0,totalRenderPts=0,totalGradStops=0;
  for(const sc of shapeCosts){totalPathCount+=sc.paths.length;totalPathVerts+=sc.vertices;totalRenderPts+=sc.renderPoints;for(const p of sc.paints){const k=p.paint+'+'+p.color;paintBD[k]=(paintBD[k]||0)+1;paintVT[k]=(paintVT[k]||0)+sc.vertices;paintRP[k]=(paintRP[k]||0)+sc.renderPoints;totalGradStops+=p.stops;}}
  totalPathCount+=artboardFills;totalRenderPts+=artboardFills*4;

  // Image detail
  const assetList=[];
  for(const o of objects)if(o.typeName==='ImageAsset')assetList.push({name:o.name||'unnamed',width:gp(o,'width')||0,height:gp(o,'height')||0});
  const imageDraws=[];
  for(const o of objects)if(o.typeName==='Image'){const ref=gp(o,'assetId');const ai=ref!==null&&ref<assetList.length?assetList[ref]:{};imageDraws.push({name:o.name||ai.name||'unnamed',width:ai.width||0,height:ai.height||0,index:o.index,hasMesh:false});}
  // Check mesh
  function findNode(nodes,idx){for(const n of nodes){if(n.obj.index===idx)return n;const r=findNode(n.children,idx);if(r)return r;}return null;}
  for(const img of imageDraws){const nd=findNode(tree,img.index);if(nd)img.hasMesh=nd.children.some(c=>c.obj.typeName==='Mesh');}

  const meshVerts=countType('MeshVertex','ContourMeshVertex');

  // Animation analysis
  const pathProps=new Set([20,21,24,25,26,31,79,80,81,82,83,84,85,86,87,110,125,126,127,161,162,163]);
  const abCompMaps={};let cAb=null,ccc=0;
  for(const o of objects){if(o.typeName==='Artboard'){cAb=o.index;abCompMaps[cAb]={0:o};ccc=1;}else if(cAb!==null&&o.parentId!==null){abCompMaps[cAb][ccc++]=o;}}
  const objToAb={};cAb=null;for(const o of objects){if(o.typeName==='Artboard')cAb=o.index;if(cAb!==null)objToAb[o.index]=cAb;}

  const animAnalysis=[];
  for(const o of objects){
    if(o.typeName!=='LinearAnimation')continue;
    const fps=gp(o,'fps')||60,dur=gp(o,'duration')||0,loop={0:'oneShot',1:'loop',2:'pingPong'}[gp(o,'loopValue')||0]||'?';
    let propsTotal=0;const pathRecalcs=[];
    const aNode=findNode(tree,o.index);
    if(aNode)for(const ko of aNode.children){
      if(ko.obj.typeName!=='KeyedObject')continue;
      const oid=gp(ko.obj,'objectId');const ab=Object.keys(abCompMaps)[0];
      const target=ab!==undefined?(abCompMaps[ab]||{})[oid]:null;
      let tName='';if(target){tName='#'+target.index+' '+target.typeName;if(target.name)tName+=' "'+target.name+'"';}
      for(const kp of ko.children){
        if(kp.obj.typeName!=='KeyedProperty')continue;
        const pk=gp(kp.obj,'propertyKey');propsTotal++;
        if(pk!==null&&pathProps.has(pk))pathRecalcs.push({target:tName,prop:propName(pk)});
      }
    }
    animAnalysis.push({name:o.name||'unnamed',fps,duration:dur,loop,propsPerFrame:propsTotal,pathRecalcs});
  }

  // State machine
  const smData={count:countType('StateMachine'),layers:countType('StateMachineLayer'),states:countType('AnimationState','EntryState','ExitState','AnyState','BlendStateDirect','BlendState1DInput','BlendState1DViewModel'),transitions:countType('StateTransition','BlendStateTransition'),conditions:countType('TransitionTriggerCondition','TransitionNumberCondition','TransitionBoolCondition','TransitionViewModelCondition','TransitionArtboardCondition'),inputs:countType('StateMachineNumber','StateMachineBool','StateMachineTrigger'),listeners:countType('StateMachineListener')};

  let maxDepth=0;function walkD(n,d){if(d>maxDepth)maxDepth=d;n.children.forEach(c=>walkD(c,d+1));}tree.forEach(r=>walkD(r,0));
  const catCounts={};for(const o of objects)catCounts[o.category]=(catCounts[o.category]||0)+1;

  const warnings=[];
  if(totalPathVerts>500)warnings.push('顶点数较多 ('+totalPathVerts+')');
  if(totalDraws>50)warnings.push('Draw calls 较多 ('+totalDraws+'/帧)');
  if(totalClips>10)warnings.push('裁剪较多 ('+totalClips+')');
  if(totalMeshes>20)warnings.push('Mesh 较多 ('+totalMeshes+')');
  if(assetBytes>1048576)warnings.push('内嵌资源较大 ('+(assetBytes/1048576).toFixed(1)+'MB)');
  if(animAnalysis.some(a=>a.pathRecalcs.length))warnings.push('存在动画触发路径重算');
  const score=Math.min(5,1+(totalDraws>20?1:0)+(totalDraws>50?1:0)+(totalClips>5?1:0)+(totalMeshes>10?1:0)+(animAnalysis.some(a=>a.pathRecalcs.length)?1:0));

  return {
    file:{size:fileSize,objects:objects.length,assetBytes,assetCount},artboards,
    shapeCosts:shapeCosts.slice(0,20),shapeTotal:shapeCosts.length,
    renderDetail:{drawPath:totalDraws,clipPath:totalClips,drawImage:totalImages,drawImageMesh:totalMeshes,totalCalls:totalDraws+totalClips+totalImages+totalMeshes,totalPaths:totalPathCount,totalVertices:totalPathVerts,totalRenderPoints:totalRenderPts,totalGradientStops:totalGradStops,paintBreakdown:paintBD,paintVertices:paintVT,paintRenderPts:paintRP},
    imageDetail:imageDraws,meshDetail:{count:totalMeshes,meshVertices:meshVerts,textures:assetList},
    summary:{totalDraws,totalClips,totalMeshes,totalBones,totalImages,artboardFills,drawDist,score},
    animAnalysis,stateMachine:smData,hierarchy:{maxDepth},distribution:catCounts,warnings,
  };
}

// ── Graph View (Canvas) ──

let gNodes=[], gEdges=[], gZoom=1, gCamX=0, gCamY=0, gSel=null, gDragNode=null, gDragging=false, gDragX=0, gDragY=0, gDidDrag=false;
let gShowLinks=false, gLinkedSet=new Set();
const GR=14, GX=44, GY=64;
let gCollapsed=new Set(), gFocusRoot=null, gTree=[], gAllNodes={};

function gLayout() {
  gNodes=[]; gEdges=[];
  const roots = gFocusRoot ? [gFocusRoot] : gTree;
  function measure(n,d){n._d=d;const kids=gCollapsed.has(n.obj.index)?[]:n.children;if(!kids.length){n._w=1;n._leaf=true}else{n._w=0;n._leaf=false;kids.forEach(c=>{measure(c,d+1);n._w+=c._w})}}
  function position(n,xs){const y=n._d*GY+GR+30;const kids=gCollapsed.has(n.obj.index)?[]:n.children;if(!kids.length){n._x=xs*GX+GR+30;n._y=y;gNodes.push(n);return xs+1}let cur=xs;kids.forEach(c=>{cur=position(c,cur);gEdges.push({from:n,to:c})});n._x=(kids[0]._x+kids[kids.length-1]._x)/2;n._y=y;gNodes.push(n);return cur}
  let cur=0;roots.forEach(r=>{measure(r,0);cur=position(r,cur)});
}

function gDraw() {
  const cv=document.getElementById('gcanvas');if(!cv)return;
  const panel=document.querySelector('.gpanel');
  const W=cv.parentElement.clientWidth-(panel?320:0),H=cv.parentElement.clientHeight;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;cv.style.width=W+'px';cv.style.height=H+'px';
  const c=cv.getContext('2d');c.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  c.clearRect(0,0,W,H);c.save();c.translate(W/2,H/2);c.scale(gZoom,gZoom);c.translate(-gCamX,-gCamY);
  // Edges
  c.strokeStyle='#3b4261';c.lineWidth=1.2/gZoom;
  for(const e of gEdges){const my=(e.from._y+e.to._y)/2;c.beginPath();c.moveTo(e.from._x,e.from._y+GR);c.bezierCurveTo(e.from._x,my,e.to._x,my,e.to._x,e.to._y-GR);c.stroke()}
  // Nodes
  const fs=Math.max(9,Math.min(12,11/gZoom));c.textAlign='center';c.textBaseline='top';
  for(const nd of gNodes){
    const col=CAT_COLORS[nd.obj.category]||CAT_COLORS.other;
    const isSel=gSel&&gSel.obj.index===nd.obj.index;
    const isLinked=gShowLinks&&gLinkedSet.has(nd.obj.index);
    if(isLinked){c.beginPath();c.arc(nd._x,nd._y,GR+5/gZoom,0,Math.PI*2);c.strokeStyle='#ff9e64';c.lineWidth=2.5/gZoom;c.setLineDash([]);c.stroke()}
    c.beginPath();c.arc(nd._x,nd._y,GR,0,Math.PI*2);c.fillStyle=isSel?'#fff':isLinked?'#ff9e64':col;c.fill();
    if(isSel){c.strokeStyle=col;c.lineWidth=3/gZoom;c.setLineDash([]);c.stroke()}
    c.font=fs+'px -apple-system,sans-serif';c.fillStyle=isSel?'#fff':isLinked?'#ff9e64':'#c0caf5';c.fillText(nd.obj.name||nd.obj.typeName,nd._x,nd._y+GR+4);
    if(nd.children.length){const bs=5/Math.max(gZoom,.3);c.fillStyle='#3b4261';c.beginPath();c.arc(nd._x,nd._y+GR,bs+1,0,Math.PI*2);c.fill();c.strokeStyle='#9aa5ce';c.lineWidth=1.2/gZoom;c.beginPath();c.moveTo(nd._x-bs*.6,nd._y+GR);c.lineTo(nd._x+bs*.6,nd._y+GR);c.stroke();if(gCollapsed.has(nd.obj.index)){c.beginPath();c.moveTo(nd._x,nd._y+GR-bs*.6);c.lineTo(nd._x,nd._y+GR+bs*.6);c.stroke()}}
  }
  // Dashed links
  if(gShowLinks&&gSel&&gLinkedSet.size){c.strokeStyle='#ff9e64';c.lineWidth=2/gZoom;c.setLineDash([6/gZoom,4/gZoom]);for(const nd of gNodes){if(!gLinkedSet.has(nd.obj.index))continue;c.beginPath();c.moveTo(gSel._x,gSel._y);c.lineTo(nd._x,nd._y);c.stroke()}c.setLineDash([])}
  c.restore();
  // Legend
  gDrawLegend(c,W,H);
}

function gDrawLegend(c,W,H){
  const cats=Object.entries(CAT_COLORS);const lx=10,ly=H-cats.length*16-10;
  c.font='10px -apple-system,sans-serif';c.textAlign='left';c.textBaseline='middle';
  cats.forEach(([cat,col],i)=>{const y=ly+i*16;c.fillStyle=col;c.beginPath();c.arc(lx+5,y,4,0,Math.PI*2);c.fill();c.fillStyle='#9aa5ce';c.fillText(cat,lx+14,y)});
}

function gHitTest(sx,sy){const cv=document.getElementById('gcanvas');const W=cv.clientWidth,H=cv.clientHeight;const wx=(sx-W/2)/gZoom+gCamX,wy=(sy-H/2)/gZoom+gCamY;let best=null,bd=GR*1.8;for(const n of gNodes){const d=Math.sqrt((n._x-wx)**2+(n._y-wy)**2);if(d<bd){bd=d;best=n}}return best}
function gFit(){if(!gNodes.length)return;let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;for(const n of gNodes){if(n._x<x0)x0=n._x;if(n._y<y0)y0=n._y;if(n._x>x1)x1=n._x;if(n._y>y1)y1=n._y}const cv=document.getElementById('gcanvas');const W=cv.clientWidth,H=cv.clientHeight;gCamX=(x0+x1)/2;gCamY=(y0+y1)/2;gZoom=Math.min(W/(x1-x0+200),H/(y1-y0+100),2);gDraw()}

function gSelectNode(nd){
  gSel=nd;gLinkedSet.clear();
  if(nd){for(const p of nd.obj.properties){const lk=(nd.obj._refLinks||{})[p.key];if(lk!==undefined)gLinkedSet.add(lk)}}
}

function gShowPanel(nd){

  if(!nd){panel.innerHTML='<p style="color:#565f89;padding:20px">'+t('clickNode')+'</p>';return}

  let h='<h3>Object</h3>';

function gRenderProps(o,refs,links,filter){
  let h='';const fl=filter.toLowerCase();
  for(const p of o.properties){
    const pn=propName(p.key);
    if(fl&&!(pn+' '+fmtVal(p,refs)+' '+p.key).toLowerCase().includes(fl))continue;
    const vc=p.type===1?'s':p.type===5?'b':p.type===3?'c':'n';
    let val=esc(fmtVal(p,refs));
    if(links[p.key]!==undefined)val='<a href="#" onclick="gNavTo('+links[p.key]+');return false" style="color:#7aa2f7;text-decoration:underline">'+val+'</a>';

function handleFile(file) {
  if (!file || !file.name.endsWith('.riv')) { alert(t('alertBadFile')); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const {header, objects, fileSize} = parseRiv(e.target.result);
      const tree = buildTree(objects);
      resolveRefs(objects, tree);
      const stats = computeStats(header, objects, tree, fileSize);
      currentData = {header, objects, tree, stats, filename: file.name};
      showMain();
    } catch(err) { alert(t('alertParseFail') + err.message); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

function renderTreeNodes(query) {
  const root = document.getElementById('treeRoot');
  function matchQ(n) {
    if (!query) return true;
    const s = (n.obj.typeName+' '+(n.obj.name||'')+' '+n.obj.properties.map(p=>propName(p.key)+' '+fmtVal(p,n.obj._refs)).join(' ')).toLowerCase();
    return s.includes(query) || n.children.some(matchQ);
  }
  function renderNode(n, depth) {
    if (query && !matchQ(n)) return '';
    const o=n.obj, col=CAT_COLORS[o.category]||CAT_COLORS.other;
    const hasKids=n.children.length>0, open=depth<1;
    let h='<div class="tnode">';
    h+='<div class="trow" onclick="treeToggle('+o.index+')">';
    h+='<span class="tarr'+(hasKids?'':' leaf')+(open?' open':'')+'" id="ta'+o.index+'">▶</span>';
    h+='<span class="tidx">#'+o.index+'</span>';
    h+='<span class="tbadge" style="background:'+col+'">'+esc(o.typeName)+'</span>';
    if(o.name)h+='<span class="tname">'+esc(o.name)+'</span>';
    h+='</div>';
    if(o.properties.length){
      h+='<div class="tprops'+(open?' open':'')+'" id="tp'+o.index+'">';
      const refs=o._refs||{};
      for(const p of o.properties){
        const vc=p.type===1?'s':p.type===5?'b':p.type===3?'c':'n';
        let val=esc(fmtVal(p,refs));
        if(p.type===3){const v=p.value>>>0;const a=(v>>24&0xff)/255,r=v>>16&0xff,g=v>>8&0xff,b=v&0xff;val='<span class="csw" style="background:rgba('+r+','+g+','+b+','+a.toFixed(2)+')"></span>'+val}
        h+='<div class="tprop"><span class="tpk">'+esc(propName(p.key))+'</span><span class="tpv '+vc+'">'+val+'</span></div>';
      }
      h+='</div>';
    }
    if(hasKids){h+='<div class="tkids'+(open?' open':'')+'" id="tk'+o.index+'">';for(const c of n.children)h+=renderNode(c,depth+1);h+='</div>'}
    h+='</div>';return h;
  }
  let html='';for(const r of currentData.tree)html+=renderNode(r,0);
  root.innerHTML=html;

    h+=sr(t('loopAnim'),loopA.length+'/'+anims.length);h+=sr(t('totalInterp'),totalP);h+=sr(t('pathRecalcAnim'),recalcA.length+(totalR?' ('+t('total')+totalR+'次/帧)':''),recalcA.length>0);
    if(topH.length)h+='<canvas id="stAnimBars" width="300" height="'+Math.max(30,topH.length*20+4)+'" style="margin-top:4px"></canvas>';
    if(recalcA.length){h+='<div style="margin-top:6px;font-size:11px;color:#ff6b6b">'+t('pathRecalcDetail')+'</div>';for(const a of recalcA.slice(0,5)){const targets=[...new Set(a.pathRecalcs.map(p=>p.target))].slice(0,3).join(', ');h+='<div style="font-size:11px;padding:1px 0"><span style="color:#ffa94d">'+esc(a.name)+'</span>: '+a.pathRecalcs.length+'次 → '+esc(targets)+'</div>'}}
    h+='</div>';
  }

  // State Machine with bar chart
  const smd=s.stateMachine;
  h+='<div class="stsec"><h3>State Machine ('+smd.count+')</h3>';
  h+=sr('Layers',smd.layers,smd.layers>10);h+=sr('Listeners',smd.listeners,smd.listeners>10);
  h+=sr('Conditions',smd.conditions);h+=sr('Inputs',smd.inputs);h+=sr('States',smd.states);h+=sr('Transitions',smd.transitions);
  if(smd.count)h+='<canvas id="stSmBars" width="300" height="80" style="margin-top:4px"></canvas>';
  h+='</div>';

  // Distribution with donut
  const dist=s.distribution;
  h+='<div class="stsec"><h3>'+t('distTitle')+'</h3>';
  h+='<div style="display:flex;gap:12px;align-items:center">';
  h+='<canvas id="stDonut2" width="110" height="110"></canvas>';
  h+='<div id="stDistLeg" style="font-size:11px"></div>';
  h+='</div></div>';

  // Warnings
  if(s.warnings.length){h+='<div class="stsec"><h3>'+t('warnings')+'</h3>';for(const w of s.warnings)h+='<div class="stwarn">• '+esc(w)+'</div>';h+='</div>'}

  h+='</div>'; // end right
  h+='</div>'; // end flex
  container.innerHTML=h;

  // Draw charts after DOM ready
  setTimeout(()=>drawStatsCharts(s),0);
}

function drawStatsCharts(s){
  const sm=s.summary, rd=s.renderDetail;
  let tipEl=document.getElementById('stTip');
  if(!tipEl){tipEl=document.createElement('div');tipEl.id='stTip';tipEl.style.cssText='display:none;position:fixed;background:#1a1b26;border:1px solid #3b4261;color:#c0caf5;padding:6px 10px;border-radius:4px;font-size:11px;pointer-events:none;z-index:200;max-width:260px;line-height:1.4';document.body.appendChild(tipEl)}
  function addHover(cv,regions,redrawFn){let hIdx=-1;cv.style.cursor='crosshair';
    cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;let hit=-1;
      for(let i=0;i<regions.length;i++){const rg=regions[i];if(rg.r!==undefined){const dx=mx-rg.cx,dy=my-rg.cy;if(Math.sqrt(dx*dx+dy*dy)>rg.r)continue;let a=Math.atan2(dy,dx);if(a<-Math.PI/2)a+=Math.PI*2;if(a>=rg.sa&&a<rg.ea){hit=i;break}}else if(mx>=rg.x&&mx<=rg.x+rg.w&&my>=rg.y&&my<=rg.y+rg.h){hit=i;break}}
      if(hit!==hIdx){hIdx=hit;if(redrawFn)redrawFn(hIdx)}
      if(hit>=0){const rg=regions[hit];tipEl.style.display='block';tipEl.style.left=(e.clientX+12)+'px';tipEl.style.top=(e.clientY-10)+'px';tipEl.innerHTML='<b>'+esc(rg.label)+'</b>: '+esc(String(rg.value))+(rg.desc?'<br><span style="color:#9aa5ce">'+esc(rg.desc)+'</span>':'')}else tipEl.style.display='none'});
    cv.addEventListener('mouseleave',()=>{tipEl.style.display='none';if(hIdx>=0){hIdx=-1;if(redrawFn)redrawFn(-1)}})}
  const DC={drawPath:'Fill/Stroke draw call',clipPath:'Stencil clip pass',drawImage:'Texture bindraw',drawImageMesh:'Mesh skinning+draw'};
  const d1=document.getElementById('stDonut1');
  if(d1){const data=[['drawPath',sm.totalDraws,'#ffa94d'],['clipPath',sm.totalClips,'#f06595'],['drawImage',sm.totalImages,'#748ffc'],['drawImageMesh',sm.totalMeshes,'#da77f2']].filter(d=>d[1]>0);
    function dr1(hi){const c=d1.getContext('2d');c.clearRect(0,0,d1.width,d1.height);return stDonut(c,55,55,44,22,data,hi)}
    const rg=dr1(-1);addHover(d1,rg.map(r=>({...r,desc:DC[r.label]||''})),dr1)}
  const pbC=document.getElementById('stPaintBars');
  if(pbC){const items=Object.entries(rd.paintBreakdown).sort((a,b)=>b[1]-a[1]);const pr=rd.paintRenderPts,maxV=Math.max(...items.map(d=>d[1]),1);pbC.width=pbC.parentElement.clientWidth-16||300;const barH=14,gap=3,tp=2;pbC.height=items.length*(barH+gap)+tp;
    const cols={'Fill+Solid':'#ffa94d','Fill+Linear':'#da77f2','Fill+Radial':'#f06595','Stroke+Solid':'#ff6b6b','Stroke+Linear':'#748ffc','Stroke+Radial':'#e8590c'};const rg=[];
    function drPB(hi){const c=pbC.getContext('2d');c.clearRect(0,0,pbC.width,pbC.height);c.font='11px -apple-system,sans-serif';rg.length=0;
      items.forEach(([key,cnt],i)=>{const y=tp+i*(barH+gap);const w=Math.max(cnt/maxV*(pbC.width-220),4);const cl=cols[key]||'#565f89';c.fillStyle=i===hi?lc(cl):cl;c.fillRect(100,y,w,barH);if(i===hi){c.strokeStyle='#fff';c.lineWidth=1;c.strokeRect(100,y,w,barH)}c.fillStyle='#9aa5ce';c.textBaseline='middle';c.textAlign='right';c.fillText(key,95,y+barH/2);c.textAlign='left';c.fillStyle='#c0caf5';c.fillText(cnt+'x '+(pr[key]||0)+'pts',105+w,y+barH/2);rg.push({x:0,y,w:pbC.width,h:barH,label:key,value:cnt+'x, '+(pr[key]||0)+' render pts',desc:key})})}
    drPB(-1);addHover(pbC,rg,drPB)}
  const abC=document.getElementById('stAnimBars');
  if(abC){const topH=s.animAnalysis.slice().sort((a,b)=>b.propsPerFrame-a.propsPerFrame).slice(0,5).filter(a=>a.propsPerFrame>0);
    if(topH.length){const maxP=Math.max(...topH.map(a=>a.propsPerFrame),1);abC.width=abC.parentElement.clientWidth-16||300;const barH=16,gap=4,tp=2;abC.height=topH.length*(barH+gap)+tp;const rg=[];
      function drAB(hi){const c=abC.getContext('2d');c.clearRect(0,0,abC.width,abC.height);c.font='11px -apple-system,sans-serif';rg.length=0;
        topH.forEach((a,i)=>{const y=tp+i*(barH+gap);const w=Math.max(a.propsPerFrame/maxP*(abC.width-180),4);const hr=a.pathRecalcs.length;const cl=hr?'#ff6b6b':'#69db7c';c.fillStyle=i===hi?lc(cl):cl;c.fillRect(90,y,w,barH);if(i===hi){c.strokeStyle='#fff';c.lineWidth=1;c.strokeRect(90,y,w,barH)}c.fillStyle='#9aa5ce';c.textBaseline='middle';c.textAlign='right';c.fillText(a.name.substring(0,10),85,y+barH/2);c.textAlign='left';c.fillStyle='#c0caf5';c.fillText(a.propsPerFrame+t('propPerFrame')+(hr?' 🔥'+hr:''),95+w,y+barH/2);rg.push({x:0,y,w:abC.width,h:barH,label:a.name,value:a.propsPerFrame+' '+t('propPerFrame')+' ('+a.loop+')',desc:hr?hr+t('recalc'):'No path recalc'})})}
      drAB(-1);addHover(abC,rg,drAB)}}
  const sbC=document.getElementById('stSmBars');
  if(sbC&&s.stateMachine.count){const smd=s.stateMachine;const items=[['Layers',smd.layers,'#da77f2'],['Listeners',smd.listeners,'#ffa94d'],['Conditions',smd.conditions,'#4a9eff'],['Inputs',smd.inputs,'#69db7c'],['States',smd.states,'#748ffc'],['Transitions',smd.transitions,'#565f89']];
    const sd={Layers:'Concurrent animations',Listeners:'Per-frame hit test',Conditions:'Condition eval',Inputs:'Input triggers',States:'One active/layer',Transitions:'State connections'};
    const maxV=Math.max(...items.map(d=>d[1]),1);sbC.width=sbC.parentElement.clientWidth-16||300;const barH=13,gap=3,tp=2;sbC.height=items.length*(barH+gap)+tp;const rg=[];
    function drSB(hi){const c=sbC.getContext('2d');c.clearRect(0,0,sbC.width,sbC.height);c.font='10px -apple-system,sans-serif';rg.length=0;
      items.forEach((d,i)=>{const y=tp+i*(barH+gap);const w=Math.max(d[1]/maxV*(sbC.width-130),2);c.fillStyle=i===hi?lc(d[2]):d[2];c.fillRect(75,y,w,barH);if(i===hi){c.strokeStyle='#fff';c.lineWidth=1;c.strokeRect(75,y,w,barH)}c.fillStyle='#9aa5ce';c.textBaseline='middle';c.textAlign='right';c.fillText(d[0],70,y+barH/2);c.textAlign='left';c.fillStyle='#c0caf5';c.fillText(String(d[1]),80+w,y+barH/2);rg.push({x:0,y,w:sbC.width,h:barH,label:d[0],value:d[1],desc:sd[d[0]]||''})})}
    drSB(-1);addHover(sbC,rg,drSB)}
  const d2=document.getElementById('stDonut2');
  if(d2){const dist=s.distribution;const data=Object.entries(dist).map(([cat,cnt])=>[cat,cnt,CAT_COLORS[cat]||CAT_COLORS.other]).filter(d=>d[1]>0);const total=data.reduce((s,d)=>s+d[1],0);
    function dr2(hi){const c=d2.getContext('2d');c.clearRect(0,0,d2.width,d2.height);return stDonut(c,55,55,44,22,data,hi)}
    const rg=dr2(-1);addHover(d2,rg.map(r=>({...r,desc:Math.round(r.value/total*100)+'%'})),dr2);
    const leg=document.getElementById('stDistLeg');if(leg)leg.innerHTML=data.map(d=>'<div style="display:flex;align-items:center;gap:4px;padding:1px 0"><span style="width:8px;height:8px;border-radius:50%;background:'+d[2]+';flex-shrink:0"></span><span style="color:#9aa5ce;flex:1">'+esc(d[0])+'</span><span style="color:#c0caf5">'+d[1]+'</span></div>').join('')}
}
function lc(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgb('+Math.min(r+60,255)+','+Math.min(g+60,255)+','+Math.min(b+60,255)+')'}
function stDonut(c,cx,cy,r,hole,data,hi){
  const total=data.reduce((s,d)=>s+d[1],0);const rg=[];if(!total)return rg;let angle=-Math.PI/2;
  data.forEach((d,i)=>{const slice=d[1]/total*Math.PI*2;const isH=i===hi;const dr=isH?6:0;const ma=angle+slice/2;const ox=isH?Math.cos(ma)*4:0,oy=isH?Math.sin(ma)*4:0;
    c.beginPath();c.moveTo(cx+ox,cy+oy);c.arc(cx+ox,cy+oy,r+dr,angle,angle+slice);c.closePath();c.fillStyle=isH?lc(d[2]):d[2];c.fill();if(isH){c.strokeStyle='#fff';c.lineWidth=2;c.stroke()}
    rg.push({cx,cy,r:r+6,sa:angle,ea:angle+slice,label:d[0],value:d[1]});angle+=slice});
  c.beginPath();c.arc(cx,cy,hole,0,Math.PI*2);c.fillStyle='#24283b';c.fill();
  c.fillStyle='#c0caf5';c.font='bold 14px -apple-system,sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(String(total),cx,cy);return rg}

// ── Export View ──
function renderExport() {
  document.getElementById('tab-export').innerHTML = `
    <h2 style="color:#7aa2f7;margin-bottom:16px">导出分析结果</h2>
    <button class="exp-btn" onclick="exportText()">📄 导出文本报告 (.txt)</button>
    <button class="exp-btn" onclick="exportJSON()">📋 导出 JSON 数据</button>
    <button class="exp-btn" onclick="exportStats()">📊 导出性能统计 (.txt)</button>
    <p style="color:#565f89;margin-top:16px;font-size:12px">文件: ${esc(currentData.filename)} | ${currentData.objects.length} 对象</p>
  `;
}

function downloadFile(name, content, type='text/plain') {
  const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}

window.exportText = function() {
  let out='=== RIVE File: '+currentData.filename+' ===\nVersion: '+currentData.header.majorVersion+'.'+currentData.header.minorVersion+'\n\n';
  function printNode(n,indent){const o=n.obj,pfx='  '.repeat(indent),label=o.name?' "'+o.name+'"':'';out+=pfx+'['+o.index+'] '+o.typeName+label+' (typeKey='+o.typeKey+') @'+o.offset+'\n';const refs=o._refs||{};for(const p of o.properties)out+=pfx+'  '+propName(p.key)+': '+fmtVal(p,refs)+'\n';for(const c of n.children)printNode(c,indent+1)}
  currentData.tree.forEach(r=>printNode(r,0));out+='\n=== Total: '+currentData.objects.length+' objects ===\n';
  downloadFile(currentData.filename.replace('.riv','')+'.txt',out);
};

window.exportJSON = function() {
  function n2j(n){return{index:n.obj.index,type:n.obj.typeName,name:n.obj.name,properties:n.obj.properties.map(p=>({name:propName(p.key),key:p.key,value:p.value,type:p.type})),children:n.children.map(n2j)}}
  downloadFile(currentData.filename.replace('.riv','')+'.json',JSON.stringify({header:currentData.header,tree:currentData.tree.map(n2j),stats:currentData.stats},null,2),'application/json');
};

window.exportStats = function() {
  const s=currentData.stats,sm=s.summary,rd=s.renderDetail;
  let out='Analysis: '+currentData.filename+'\n'+'='.repeat(50)+'\n\n';
  out+=t('score')+': '+'★'.repeat(sm.score)+'☆'.repeat(5-sm.score)+'\n';
  out+='Draw calls: '+sm.totalDraws+'/帧  Clip: '+sm.totalClips+'  Mesh: '+sm.totalMeshes+'  Image: '+sm.totalImages+'\n';
  out+='路径: '+rd.totalPaths+'  控制顶点: '+rd.totalVertices+'  渲染点数: '+rd.totalRenderPoints+'\n\n';
  const pb=rd.paintBreakdown,pr=rd.paintRenderPts;for(const k of Object.keys(pb).sort())out+=k+': '+pb[k]+t('timesUnit')+' '+(pr[k]||0)+'渲染点\n';
  out+='\n动画: '+s.animAnalysis.length+'个\n';const topH=s.animAnalysis.slice().sort((a,b)=>b.propsPerFrame-a.propsPerFrame).slice(0,5);for(const a of topH)out+='  '+a.name+': '+a.propsPerFrame+t('propPerFrame')+(a.pathRecalcs.length?' 🔥'+a.pathRecalcs.length+t('recalc'):'')+'\n';
  out+='\nState Machine: '+s.stateMachine.count+' (Layers:'+s.stateMachine.layers+' Listeners:'+s.stateMachine.listeners+')\n';
  if(s.warnings.length){out+='\n⚠ 警告:\n';for(const w of s.warnings)out+='  • '+w+'\n'}
  downloadFile(currentData.filename.replace('.riv','')+'_stats.txt',out);
};
